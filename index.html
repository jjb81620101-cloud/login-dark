<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登入</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      background: #0f0f0f;
      color: #fff;
    }

    .left-panel {
      flex: 1;
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px;
      position: relative;
      overflow: hidden;
    }

    .left-panel::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 50%, rgba(0, 210, 255, 0.08) 0%, transparent 50%);
      animation: pulse 8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.1); opacity: 1; }
    }

    .brand {
      position: relative;
      z-index: 1;
    }

    .brand-logo {
      font-size: 2.5rem;
      margin-bottom: 20px;
    }

    .brand h1 {
      font-size: 3rem;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 16px;
      background: linear-gradient(90deg, #00d2ff, #7b2ff7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .brand p {
      font-size: 1.1rem;
      color: #888;
      max-width: 400px;
      line-height: 1.6;
    }

    .features {
      margin-top: 60px;
      position: relative;
      z-index: 1;
    }

    .feature {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .feature-icon {
      width: 48px;
      height: 48px;
      background: rgba(0, 210, 255, 0.1);
      border: 1px solid rgba(0, 210, 255, 0.3);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
    }

    .feature h3 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .feature p {
      font-size: 0.85rem;
      color: #666;
    }

    .right-panel {
      width: 480px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .login-card {
      width: 100%;
      max-width: 380px;
    }

    .login-header {
      margin-bottom: 40px;
    }

    .login-header h2 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .login-header p {
      color: #666;
      font-size: 0.95rem;
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: #888;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper input {
      width: 100%;
      padding: 16px 20px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      font-size: 1rem;
      color: #fff;
      transition: all 0.3s ease;
      font-family: inherit;
      outline: none;
    }

    .input-wrapper input::placeholder {
      color: #555;
    }

    .input-wrapper input:focus {
      border-color: #00d2ff;
      box-shadow: 0 0 0 3px rgba(0, 210, 255, 0.1);
    }

    .input-wrapper .input-icon {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.1rem;
      opacity: 0.5;
    }

    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }

    .checkbox-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    .checkbox-wrapper input {
      width: 20px;
      height: 20px;
      accent-color: #00d2ff;
      cursor: pointer;
    }

    .checkbox-wrapper span {
      font-size: 0.9rem;
      color: #888;
    }

    .forgot-link {
      color: #00d2ff;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: opacity 0.2s;
    }

    .forgot-link:hover {
      opacity: 0.8;
    }

    .btn-login {
      width: 100%;
      padding: 18px;
      background: linear-gradient(90deg, #00d2ff, #7b2ff7);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: inherit;
      margin-bottom: 24px;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0, 210, 255, 0.25);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 24px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #333;
    }

    .divider span {
      font-size: 0.85rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .social-buttons {
      display: flex;
      gap: 12px;
    }

    .btn-social {
      flex: 1;
      padding: 14px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      color: #fff;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-family: inherit;
    }

    .btn-social:hover {
      border-color: #555;
      background: #222;
    }

    .btn-social span {
      font-size: 0.85rem;
      font-weight: 500;
    }

    .signup-text {
      text-align: center;
      margin-top: 32px;
      font-size: 0.9rem;
      color: #666;
    }

    .signup-text a {
      color: #00d2ff;
      text-decoration: none;
      font-weight: 600;
    }

    .signup-text a:hover {
      text-decoration: underline;
    }

    @media (max-width: 900px) {
      body {
        flex-direction: column;
      }

      .left-panel {
        padding: 40px 24px;
        min-height: auto;
      }

      .brand h1 {
        font-size: 2rem;
      }

      .features {
        display: none;
      }

      .right-panel {
        width: 100%;
        padding: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="left-panel">
    <div class="brand">
      <div class="brand-logo">✨</div>
      <h1>開始你的<br>創作之旅</h1>
      <p>加入我們，探索無限可能。我們的平台幫助你實現想法，與世界連結。</p>
    </div>

    <div class="features">
      <div class="feature">
        <div class="feature-icon">🚀</div>
        <div>
          <h3>快速上手</h3>
          <p>三分鐘創建你的第一個項目</p>
        </div>
      </div>
      <div class="feature">
        <div class="feature-icon">🔒</div>
        <div>
          <h3>安全可靠</h3>
          <p>企業級加密保護你的資料</p>
        </div>
      </div>
      <div class="feature">
        <div class="feature-icon">🌍</div>
        <div>
          <h3>全球覆蓋</h3>
          <p>隨時隨地存取你的內容</p>
        </div>
      </div>
    </div>
  </div>

  <div class="right-panel">
    <div class="login-card">
      <div class="login-header">
        <h2>歡迎回來</h2>
        <p>請填寫以下資訊登入</p>
      </div>

      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>電子郵件</label>
          <div class="input-wrapper">
            <input type="email" placeholder="name@example.com" required>
            <span class="input-icon">📧</span>
          </div>
        </div>

        <div class="form-group">
          <label>密碼</label>
          <div class="input-wrapper">
            <input type="password" placeholder="輸入密碼" required>
            <span class="input-icon">🔐</span>
          </div>
        </div>

        <div class="form-options">
          <label class="checkbox-wrapper">
            <input type="checkbox">
            <span>記住我</span>
          </label>
          <a href="#" class="forgot-link">忘記密碼？</a>
        </div>

        <button type="submit" class="btn-login">登入</button>
      </form>

      <div class="divider"><span>或</span></div>

      <div class="social-buttons">
        <button class="btn-social" onclick="socialLogin('Google')">
          🔍 <span>Google</span>
        </button>
        <button class="btn-social" onclick="socialLogin('Apple')">
          🍎 <span>Apple</span>
        </button>
      </div>

      <p class="signup-text">
        還沒有帳戶？<a href="#">立即註冊</a>
      </p>
    </div>
  </div>

  <script>
    function handleLogin(e) {
      e.preventDefault();
      alert('這是純前端展示頁面，需要後端才能實際登入');
    }

    function socialLogin(provider) {
      alert(`${provider} 登入需要 OAuth 設定`);
    }
  </script>
</body>
</html>
